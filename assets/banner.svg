<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080812;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#121224;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6440ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chevGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffc8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Ambient orbs -->
  <circle cx="120" cy="80" r="120" fill="#00b4ff" opacity="0.06"/>
  <circle cx="300" cy="160" r="100" fill="#7800ff" opacity="0.04"/>

  <!-- Glass card behind icon -->
  <rect x="40" y="35" width="140" height="130" rx="20" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- T lettermark -->
  <g filter="url(#glow)">
    <rect x="60" y="58" width="56" height="14" rx="7" fill="url(#tGrad)"/>
    <rect x="78" y="68" width="18" height="68" rx="9" fill="url(#tGrad)"/>
  </g>

  <!-- Chevron > -->
  <g filter="url(#glow)">
    <path d="M 118 65 L 148 100 L 118 135" fill="none" stroke="url(#chevGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cursor _ -->
  <rect x="152" y="122" width="24" height="8" rx="4" fill="url(#chevGrad)" opacity="0.9"/>

  <!-- App name -->
  <text x="230" y="115" font-family="Consolas, 'Courier New', monospace" font-size="64" font-weight="700" fill="#e0e0e0" letter-spacing="3">Termi</text>

  <!-- Tagline -->
  <text x="233" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#666" letter-spacing="0.8">A modern terminal for Windows</text>

  <!-- Accent dots -->
  <circle cx="165" cy="155" r="4" fill="#00ffb4" opacity="0.7"/>
  <circle cx="56" cy="50" r="3" fill="#8c3cff" opacity="0.6"/>
</svg>
