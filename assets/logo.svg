<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0090b8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bgGrad)" stroke="#2a2a4a" stroke-width="3"/>

  <!-- Terminal prompt chevron > -->
  <g filter="url(#glow)">
    <path d="M 120 160 L 220 256 L 120 352"
          fill="none" stroke="url(#accentGrad)" stroke-width="36"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cursor/underscore line -->
  <rect x="240" y="320" width="160" height="32" rx="6" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Subtle terminal lines (decorative) -->
  <rect x="240" y="180" width="200" height="8" rx="4" fill="#2a2a4a" opacity="0.6"/>
  <rect x="240" y="210" width="140" height="8" rx="4" fill="#2a2a4a" opacity="0.4"/>
  <rect x="240" y="240" width="170" height="8" rx="4" fill="#2a2a4a" opacity="0.3"/>
  <rect x="240" y="270" width="100" height="8" rx="4" fill="#2a2a4a" opacity="0.2"/>
</svg>
